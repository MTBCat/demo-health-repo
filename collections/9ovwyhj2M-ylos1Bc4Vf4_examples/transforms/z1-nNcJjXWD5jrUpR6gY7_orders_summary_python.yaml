source:
  body: "# Write your Python transformation script here\nimport common\nimport pandas as pd\n\ndef transform(orders):    \n    \"\"\"\n    Your transformation function.\n\n    Args:\n        orders: DataFrame containing the data from the \"Sample Database PG.public.orders\" table\n\n    Returns:\n        DataFrame to write to the destination table\n    \"\"\"\n    # Your transformation logic here \n\n    orders['month'] = orders['created_at'].to_numpy().astype('datetime64[M]')\n    \n    # Group by the month of the order_date\n    # monthly_summary = orders.groupby(\"month\")['total'].sum()\n\n    monthly_summary = orders.groupby(\"month\").agg(\n    order_sum=('total', 'sum'),\n    order_mean=('total', 'mean'),\n    order_median=('total', 'median'),\n    order_std=('total','std'))\n    \n    return pd.DataFrame(monthly_summary)"
